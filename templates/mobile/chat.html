{% extends 'index.html' %}
{% block header %}
<script src="static/chat.js"></script>
<script src="static/styles.js"></script>
{% endblock %}
{% block content %}
<div id="topbar">
    <h2 id="RoomDisplay" style="margin: 14.5px 0; padding-left: 22px;" onclick="openNav();">/e</h2>
    <div class="AccountPopup">
    <input type="image" id="pfpmenu" class="PictureBTN" onclick="OpenAC();" name="pfpmenu" src="static/favicon.ico">
    <div id="AccControls" class="AccControls" style="display: none;">
            <a href="/logout">Logout</a>
            <a href="/settings">Settings</a>
            <a href="/#">Soon</a>
        </div>
    </div>
</div>

    <div id="mySidenav" class="sidenav" style="background-color: rgb(17, 17, 17); width: 0px;">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()" style="color: rgb(129, 129, 129);">×</a>
        <hr style="border: 5px solid grey;">
        <div id="activenav">
            <div id="online_users"></div>
        </div>
        <div style="margin-right: 40%;">
            <p>change the chat room you are in</p>
            <div class="ChatRoomS">
                <div id="ChatRoomls"><hr></div>
            </div>
        </div>
            <div id="extratext" style="margin-right: 40%;">
                <h6><a href="/changelog" style="color: rgb(129, 129, 129);">Update log</a></h6>
                <h6><a href="#TELL-THE-OWNERS-TO-GET-YOUR-OWN-CONTACT-FOR-YOU-AND-LET-THEM-CONTACT-US" style="color: rgb(129, 129, 129);">Contact us</a></h6>
                <h6><a href="https://github.com/01000011-00110111/School-Chat" style="color: rgb(129, 129, 129);">Source Code</a></h6>
            </div>
            <br>
            <br>
    </div>
<div id="chat"></div>

<div id="sides" style="background-color: rgb(8, 8, 8); margin-left: 0px;">
    <div id="chatbox" style="display: flex;">       
        <input type="text" id="message" onkeypress="checkKey();" placeholder="type your message here" maxlength="250" style="color: rgb(0, 0, 0);"><br>
        <button onclick="sendMessage();" id="send" style="background-color: rgb(0, 102, 0); color: rgb(255, 255, 255);">Send</button>
    </div>
</div><br>

{% endblock %}
